<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dead Era</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="bg"><div class="fog f1"></div><div class="fog f2"></div></div>

<div id="app">
  <header>
    <h1>DEAD ERA</h1>
    <span class="info" id="turnInfo"></span>
    <span class="info" id="aiInfo"></span>
    <span class="spacer"></span>
    <button id="packsBtn" onclick="openPacksScreen()">Packs</button>
    <button onclick="openBuilderScreen()">Collection</button>
    <button id="aiModeBtn" onclick="toggleAiMode()">AI: Scripted</button>
    <button onclick="showMainMenu()">Menu</button>
  </header>

  <main id="table">
    <section class="dim living">
      <h2>Living Dimension</h2>
      <div class="siderow">
        <div class="chip" id="chip-ai-living"></div>
      </div>
      <div class="row" id="row-ai-living" data-label="enemy allies"></div>
      <div class="row" id="row-p-living" data-label="your allies"></div>
      <div class="siderow">
        <div class="chip" id="chip-p-living"></div>
      </div>
    </section>

    <div id="veil"></div>

    <section class="dim dead">
      <h2>Dead Dimension</h2>
      <div class="siderow">
        <div class="chip" id="chip-ai-dead"></div>
      </div>
      <div class="row" id="row-ai-dead" data-label="enemy dead"></div>
      <div class="row" id="row-p-dead" data-label="your dead"></div>
      <div class="siderow">
        <div class="chip" id="chip-p-dead"></div>
      </div>
    </section>

    <aside id="logbox"></aside>
  </main>

  <footer id="tray">
    <div id="controls">
      <div class="orbrow">
        <div class="orbcell"><div class="orb"><b id="essDisp">0</b></div><div class="orbsub"><span id="essMax">of 0</span> essence</div></div>
        <div class="orbcell"><div class="orb orb-dead"><b id="deadEssDisp">0</b></div><div class="orbsub"><span id="deadEssMax">crossed over</span> dead energy</div></div>
      </div>
      <div class="ctlrow"><span>deck <b id="pDeckDisp">25</b></span></div>
      <button id="powerBtn" onclick="uiHeroPower()" title="">Hero Power</button>
      <button id="sacBtn" onclick="uiSkipSacrifice()">Skip Sacrifice</button>
      <button class="endturn" id="endBtn" onclick="uiEndTurn()">End Turn</button>
    </div>
    <div class="handbox">
      <h3>Hand — living dimension</h3>
      <div class="hand" id="pHand"></div>
    </div>
    <div class="handbox deadhand">
      <h3>Dead Hand — sacrificed · paid with dead energy</h3>
      <div class="hand" id="pDeadHand"></div>
    </div>
  </footer>
</div>

<div id="banner"></div>
<div id="hint"></div>
<div id="preview"></div>
<div id="heroSelect"></div>
<div id="mulligan"></div>
<div id="metaScreen"></div>
<div id="mainMenu">
  <div class="mm-title">DEAD ERA</div>
  <div class="mm-sub">one deck · two dimensions · death is redeployment</div>
  <div class="mm-buttons">
    <button class="mm-btn" id="mmContinue" onclick="menuContinue()">Continue Game</button>
    <button class="mm-btn mm-primary" onclick="menuPlay()">Play vs AI</button>
    <button class="mm-btn" onclick="mpShowLobby()">⚔ Play a Friend (link)</button>
    <button class="mm-btn" onclick="menuPlayRandom()">Random Deck Match</button>
    <button class="mm-btn" onclick="menuCollection()">Collection &amp; Deck</button>
    <button class="mm-btn" onclick="menuPacks()">Open Packs</button>
    <button class="mm-btn mm-minor" id="mmAiBtn" onclick="toggleAiMode()">AI: Scripted</button>
  </div>
  <div class="mm-stats" id="mmStats"></div>
</div>
<div id="overlay">
  <div id="ovTitle"></div>
  <div id="ovWhy"></div>
  <button onclick="uiNewGame()">Play Again</button>
</div>

<script src="art/manifest.js"></script>
<script src="js/cards.js"></script>
<script src="js/art.js"></script>
<script src="js/game.js"></script>
<script src="js/sets/veilbound.js"></script>
<script src="js/sets/hexrelic.js"></script>
<script src="js/meta.js"></script>
<script src="js/ui.js"></script>
<script src="js/net.js"></script>
</body>
</html>
